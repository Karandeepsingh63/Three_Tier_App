name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Image
      run: |
        docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/inventory-backend:latest ./backend

    - name: Build Frontend Image
      run: |
        docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:latest ./frontend

    - name: Scan Backend Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/inventory-backend:latest
        format: table
        severity: HIGH,CRITICAL
        exit-code: 0
        ignore-unfixed: true

    - name: Scan Frontend Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:latest
        format: table
        severity: HIGH,CRITICAL
        exit-code: 0
        ignore-unfixed: true

    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/inventory-backend:latest

    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:latest